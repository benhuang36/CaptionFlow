name: CaptionFlow
options:
  bundleIdPrefix: com.captionflow
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # 穩定簽章:綁定 team ID(+ 固定 bundle id),讓 TCC(螢幕錄製等)授權跨 build 保留,
    # 不會每次重 build 又跳提示。請用 Xcode 自動簽章建置(會自動取用 Apple Development 憑證)。
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "3VT8ZCBGNS"
    ENABLE_HARDENED_RUNTIME: NO

packages:
  mlx-swift-examples:
    url: https://github.com/ml-explore/mlx-swift-examples
    from: "2.29.1"
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: "1.0.0"
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "1.0.0"
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    from: "0.29.0"

targets:
  CaptionFlow:
    type: application
    platform: macOS
    sources:
      - path: CaptionFlow
    dependencies:
      - package: mlx-swift-examples
        product: MLXLLM
      - package: mlx-swift-examples
        product: MLXLMCommon
      - package: swift-transformers
        product: Hub
      - package: WhisperKit
        product: WhisperKit
      - package: mlx-swift
        product: MLX
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.captionflow.app
        CODE_SIGN_ENTITLEMENTS: CaptionFlow/CaptionFlow.entitlements
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "CaptionFlow needs access to system audio to generate captions in real time."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "CaptionFlow transcribes speech to text on-device to generate captions."
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 CaptionFlow."
